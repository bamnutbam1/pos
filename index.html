<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a0a00">
<title>ครัวอ้อยอ้อย - ระบบรับออเดอร์</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #f0d080;
  --dark: #0f0600;
  --dark2: #1a0e04;
  --dark3: #251508;
  --card: #1e1005;
  --card2: #2a1a08;
  --text: #f5e6c8;
  --text2: #c8a878;
  --red: #c0392b;
  --green: #27ae60;
  --orange: #e67e22;
  --border: #4a2e10;
  --radius: 12px;
  --shadow: 0 4px 15px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0;
  padding-bottom: 120px; /* Space for FAB and footer */
  background: var(--dark);
  color: var(--text);
  font-family: 'Sarabun', sans-serif;
  overflow-x: hidden;
}

h1, h2, h3, .btn-main { font-family: 'Prompt', sans-serif; }

/* Header & Navigation */
header {
  background: var(--dark2);
  padding: 15px;
  border-bottom: 2px solid var(--gold);
  position: sticky;
  top: 0;
  z-index: 100;
  text-align: center;
  box-shadow: var(--shadow);
}
header h1 { margin: 0; font-size: 1.4rem; color: var(--gold); letter-spacing: 1px; }
header p { margin: 5px 0 0; font-size: 0.85rem; opacity: 0.8; }

/* Main Order Form Card */
.container { padding: 15px; max-width: 600px; margin: auto; }

.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}

.input-group { margin-bottom: 15px; }
.input-group label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--gold-light); }
.input-group input, .input-group textarea, .input-group select {
  width: 100%;
  padding: 12px;
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: white;
  font-size: 1rem;
  font-family: 'Sarabun', sans-serif;
}

/* Quick Tags */
.tags-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.tag {
  background: var(--dark2);
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
  cursor: pointer;
}
.tag:active { background: var(--gold); color: white; }

/* Order List UI */
.order-item {
  background: var(--card2);
  margin-bottom: 10px;
  padding: 15px;
  border-radius: var(--radius);
  border-left: 4px solid var(--gold);
  display: flex;
  justify-content: space-between;
  align-items: center;
  animation: slideIn 0.3s ease-out;
}
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

.order-info b { font-size: 1.1rem; color: var(--gold-light); }
.order-info p { margin: 4px 0 0; font-size: 0.9rem; color: var(--text2); }

.action-btns { display: flex; gap: 10px; }
.btn-icon {
  background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text2);
}
.btn-icon.print { color: var(--gold); }
.btn-icon.delete { color: var(--red); }

/* Bottom Action Bar */
.bottom-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: var(--dark2);
  padding: 15px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  z-index: 99;
}
.btn-main {
  background: linear-gradient(to bottom, var(--gold-light), var(--gold));
  color: var(--dark);
  border: none;
  padding: 12px 30px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 1rem;
  box-shadow: 0 4px 10px rgba(201, 168, 76, 0.4);
}

/* Modal */
.modal-overlay {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 1000;
}
.modal {
  background: var(--dark2);
  width: 100%;
  max-width: 400px;
  border-radius: 15px;
  border: 1px solid var(--gold);
  padding: 25px;
  text-align: center;
}

/* Toast */
.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--gold);
  color: black;
  padding: 10px 20px;
  border-radius: 20px;
  font-weight: bold;
  z-index: 1001;
  display: none;
}
</style>
</head>
<body>

<header>
  <h1>ครัวอ้อยอ้อย</h1>
  <p id="nav-sub">ระบบจัดการคำสั่งซื้อ</p>
</header>

<div class="container">
  <!-- สั่งอาหารด่วน -->
  <div class="card">
    <h3 style="margin-top:0; color:var(--gold)">เพิ่มออเดอร์ใหม่</h3>
    <div class="input-group">
      <label>รายการอาหาร</label>
      <input type="text" id="inp-menu" placeholder="เช่น ผัดไทยกุ้งสด 2">
      <div class="tags-container" id="recent-tags">
        <!-- Tags will appear here -->
      </div>
    </div>
    <div class="input-group">
      <label>หมายเหตุ / โต๊ะ</label>
      <input type="text" id="inp-note" placeholder="โต๊ะ 5 / ไม่เผ็ด / พิเศษ">
    </div>
    <button class="btn-main" style="width:100%" onclick="addOrder()">เพิ่มเข้าคิว</button>
  </div>

  <h3 style="color:var(--gold-light)">ออเดอร์ที่ค้างอยู่ (<span id="count">0</span>)</h3>
  <div id="order-list">
    <!-- Orders list -->
  </div>
</div>

<div class="bottom-bar">
  <button class="btn-main" style="background: var(--dark3); color: var(--gold); border: 1px solid var(--gold);" onclick="connectBT()">
    🔗 เชื่อมต่อเครื่องพิมพ์
  </button>
  <button class="btn-main" onclick="printAll()">
    🖨️ พิมพ์ทั้งหมด
  </button>
</div>

<!-- Modal ตั้งค่า -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal">
    <h3>ตั้งค่าระบบ</h3>
    <div class="input-group" style="text-align:left">
      <label>ชื่อร้าน</label>
      <input type="text" id="set-shop" value="ครัวอ้อยอ้อย">
    </div>
    <div class="input-group" style="text-align:left">
      <label>เบอร์โทร</label>
      <input type="text" id="set-phone" value="08x-xxx-xxxx">
    </div>
    <button class="btn-main" onclick="saveSettings()">บันทึก</button>
    <button class="btn-main" style="background:none; color:white;" onclick="toggleModal('modal-settings', false)">ปิด</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let orders = [];
let btDevice = null;
let btChar = null;
let settings = {
  shopName: "ครัวอ้อยอ้อย",
  phone: "08x-xxx-xxxx"
};

// ============================================================
// CORE LOGIC
// ============================================================

function addOrder() {
  const menu = document.getElementById('inp-menu').value.trim();
  const note = document.getElementById('inp-note').value.trim();
  
  if(!menu) {
    showToast('กรุณากรอกรายการอาหาร');
    return;
  }

  const newOrder = {
    id: Date.now(),
    menu: menu,
    note: note,
    time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
  };

  orders.push(newOrder);
  saveToLocal();
  renderOrders();
  
  // Clear input
  document.getElementById('inp-menu').value = '';
  document.getElementById('inp-note').value = '';
  showToast('เพิ่มออเดอร์แล้ว');
  
  updateTags(menu);
}

function deleteOrder(id) {
  orders = orders.filter(o => o.id !== id);
  saveToLocal();
  renderOrders();
}

function renderOrders() {
  const list = document.getElementById('order-list');
  const countEl = document.getElementById('count');
  list.innerHTML = '';
  countEl.textContent = orders.length;

  orders.slice().reverse().forEach(o => {
    const div = document.createElement('div');
    div.className = 'order-item';
    div.innerHTML = `
      <div class="order-info">
        <b>${o.menu}</b>
        <p>${o.note ? '📝 ' + o.note : ''} <small>(${o.time})</small></p>
      </div>
      <div class="action-btns">
        <button class="btn-icon print" onclick="printSingle(${o.id})">🖨️</button>
        <button class="btn-icon delete" onclick="deleteOrder(${o.id})">🗑️</button>
      </div>
    `;
    list.appendChild(div);
  });
}

// ============================================================
// BLUETOOTH PRINTING (THAI SUPPORT)
// ============================================================

// แปลง String ภาษาไทยเป็นรหัสเครื่องพิมพ์ (Windows-874)
function encodeThai(str) {
  const thaiMap = {
    'ก': 0xA1, 'ข': 0xA2, 'ค': 0xA4, 'ง': 0xA7, 'จ': 0xA8, 'ฉ': 0xA9, 'ช': 0xAA,
    'ซ': 0xAB, 'ญ': 0xAD, 'ด': 0xAE, 'ต': 0xAF, 'ถ': 0xB0, 'ท': 0xB1, 'ธ': 0xB3,
    'น': 0xB4, 'บ': 0xB5, 'ป': 0xB6, 'ผ': 0xB7, 'ฝ': 0xB8, 'พ': 0xB9, 'ฟ': 0xBA,
    'ภ': 0xBB, 'ม': 0xBC, 'ย': 0xBD, 'ร': 0xBE, 'ล': 0xBF, 'ว': 0xC2, 'ศ': 0xC3,
    'ษ': 0xC4, 'ส': 0xC5, 'ห': 0xC6, 'ฬ': 0xC7, 'อ': 0xC8, 'ฮ': 0xC9,
    'ะ': 0xD0, 'ั': 0xD1, 'า': 0xD2, 'ำ': 0xD3, 'ิ': 0xD4, 'ี': 0xD5, 'ึ': 0xD6, 'ื': 0xD7,
    'ุ': 0xD8, 'ู': 0xD9, 'ฺ': 0xDA, 'เ': 0xE0, 'แ': 0xE1, 'โ': 0xE2, 'ใ': 0xE3, 'ไ': 0xE4,
    '่': 0xE8, '้': 0xE9, '๊': 0xEA, '๋': 0xEB, '์': 0xEC, 'ๆ': 0xE6, '็': 0xE7
    // นี่เป็นเพียงส่วนหนึ่ง แนะนำให้ใช้ TextEncoder 'windows-874' หากเบราว์เซอร์รองรับ
  };

  // วิธีที่ปลอดภัยที่สุดคือการใช้ Uint8Array และวนลูปแปลงรหัส ASCII + Thai Offset
  const buffer = new Uint8Array(str.length);
  for (let i = 0; i < str.length; i++) {
    let code = str.charCodeAt(i);
    if (code >= 0x0E01 && code <= 0x0E5B) {
      buffer[i] = code - 0x0E00 + 0xA0; // Map Thai to CP874
    } else {
      buffer[i] = code;
    }
  }
  return buffer;
}

async function connectBT() {
  try {
    btDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb', '49535343-fe7d-4ae5-8fa9-9fafd205e455'] }],
      optionalServices: ['0000ff00-0000-1000-8000-00805f9b34fb']
    });
    const server = await btDevice.gatt.connect();
    // ค้นหา Service และ Characteristic สำหรับเขียนข้อมูล
    const services = await server.getPrimaryServices();
    for(let service of services) {
        let chars = await service.getCharacteristics();
        for(let char of chars) {
            if(char.properties.write || char.properties.writeWithoutResponse) {
                btChar = char;
                break;
            }
        }
        if(btChar) break;
    }
    showToast('✅ เชื่อมต่อแล้ว');
  } catch(e) {
    showToast('❌ การเชื่อมต่อล้มเหลว: ' + e.message);
  }
}

async function sendToPrinter(text) {
  if(!btChar) {
    showToast('⚠️ กรุณาเชื่อมต่อเครื่องพิมพ์ก่อน');
    return;
  }
  
  // คำสั่ง ESC/POS เบื้องต้น
  const ESC = 0x1B;
  const GS = 0x1D;
  const init = new Uint8Array([ESC, 0x40]); // Reset printer
  const thaiMode = new Uint8Array([ESC, 0x74, 0x11]); // Set code page to Thai (depends on printer model)
  const cut = new Uint8Array([ESC, 0x64, 3, GS, 0x56, 66, 0]); // Feed and Cut
  
  const content = encodeThai(text + "\n\n");
  
  const finalData = new Uint8Array([...init, ...thaiMode, ...content, ...cut]);
  
  // ส่งข้อมูลทีละ Chunk (ประมาณ 20 bytes สำหรับ BLE มาตรฐาน)
  const chunkSize = 20;
  for (let i = 0; i < finalData.length; i += chunkSize) {
    await btChar.writeValue(finalData.slice(i, i + chunkSize));
  }
}

function printSingle(id) {
  const order = orders.find(o => o.id === id);
  if(!order) return;
  const text = `
--------------------------------
      ${settings.shopName}
--------------------------------
รายการ: ${order.menu}
หมายเหตุ: ${order.note || '-'}
เวลา: ${order.time}
--------------------------------
  `;
  sendToPrinter(text);
}

function printAll() {
    if(orders.length === 0) return showToast('ไม่มีออเดอร์ให้พิมพ์');
    let text = `--- สรุปออเดอร์ทั้งหมด ---\n`;
    orders.forEach(o => {
        text += `${o.time} | ${o.menu} (${o.note})\n`;
    });
    sendToPrinter(text);
}

// ============================================================
// UTILITIES
// ============================================================

function saveToLocal() {
  localStorage.setItem('krua_orders', JSON.stringify(orders));
}

function loadLocal() {
  const saved = localStorage.getItem('krua_orders');
  if(saved) orders = JSON.parse(saved);
  const savedSet = localStorage.getItem('krua_settings');
  if(savedSet) settings = JSON.parse(savedSet);
  
  document.getElementById('nav-sub').textContent = 'ระบบจัดการ | โทร. ' + settings.phone;
  renderOrders();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function updateTags(menu) {
  let tags = JSON.parse(localStorage.getItem('krua_tags') || '[]');
  if(!tags.includes(menu)) {
    tags.unshift(menu);
    tags = tags.slice(0, 10); // เก็บ 10 อันล่าสุด
    localStorage.setItem('krua_tags', JSON.stringify(tags));
    renderTags();
  }
}

function renderTags() {
  const container = document.getElementById('recent-tags');
  const tags = JSON.parse(localStorage.getItem('krua_tags') || '[]');
  container.innerHTML = '';
  tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t;
    span.onclick = () => document.getElementById('inp-menu').value = t;
    container.appendChild(span);
  });
}

function toggleModal(id, show) {
  document.getElementById(id).style.display = show ? 'flex' : 'none';
}

function saveSettings() {
  settings.shopName = document.getElementById('set-shop').value;
  settings.phone = document.getElementById('set-phone').value;
  localStorage.setItem('krua_settings', JSON.stringify(settings));
  document.getElementById('nav-sub').textContent = 'ระบบจัดการ | โทร. ' + settings.phone;
  toggleModal('modal-settings', false);
  showToast('บันทึกการตั้งค่าแล้ว');
}

window.onload = () => {
  loadLocal();
  renderTags();
};
</script>

</body>
</html>
