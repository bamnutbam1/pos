<!DOCTYPE html>

<html class="dark" lang="th"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>

<style>
        body { -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 70px); /* 70px for nav bar */ }
        .pb-with-cart { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 140px); /* enough space for nav + floating cart */ }
    </style>
<style>
    body {
      height: 100dvh;
      overflow: hidden; /* Prevent body scrolling */
    }
  </style>
</head>
<body class="bg-[#0f1117] text-on-background font-body-md h-[100dvh] flex flex-col">
<!-- TopAppBar -->
<header class="flex-none flex justify-between items-center w-full px-4 h-14 bg-[#0f1117] border-b border-[#181c27] z-40">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-brand-surface border border-[#36343a] overflow-hidden flex items-center justify-center">
<span class="material-symbols-outlined text-brand-orange text-lg" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<h1 class="text-base font-black text-orange-500 uppercase tracking-wider font-['Work_Sans']">Operational POS</h1>
</div>
<div class="flex items-center">
<span class="font-numeric-md text-[14px] text-orange-500">#ORD-204</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-with-cart flex flex-col">
<!-- Smart Paste Section -->
<section class="flex-none p-3 border-b border-[#181c27] bg-[#181c27]">
<div class="relative">
<textarea class="w-full bg-[#0f1117] border border-[#36343a] rounded-lg p-2 text-on-surface focus:border-brand-orange focus:ring-1 focus:ring-brand-orange transition-colors font-body-md h-16 resize-none text-sm" placeholder="Paste LINE order here... e.g., '1x Pad Thai, 2x Cola'"></textarea>
<button class="absolute bottom-2 right-2 bg-brand-orange text-[#0f1117] rounded-full p-1.5 hover:bg-orange-400 active:scale-95 transition-transform flex items-center justify-center">
<span class="material-symbols-outlined text-[16px]">content_paste_go</span>
</button>
</div>
</section>
<!-- Category Horizontal Scroll -->
<section class="flex-none py-2 border-b border-[#181c27] bg-[#0f1117] sticky top-0 z-30">
<div class="flex gap-2 overflow-x-auto px-3 no-scrollbar snap-x">
<button class="snap-start whitespace-nowrap px-3 py-1.5 rounded-full bg-brand-orange/20 text-brand-orange border border-brand-orange/30 font-label-sm text-[12px]">All Items</button>
<button class="snap-start whitespace-nowrap px-3 py-1.5 rounded-full bg-brand-surface text-on-surface-variant border border-[#36343a] font-label-sm text-[12px]">Mains</button>
<button class="snap-start whitespace-nowrap px-3 py-1.5 rounded-full bg-brand-surface text-on-surface-variant border border-[#36343a] font-label-sm text-[12px]">Drinks</button>
<button class="snap-start whitespace-nowrap px-3 py-1.5 rounded-full bg-brand-surface text-on-surface-variant border border-[#36343a] font-label-sm text-[12px]">Sides</button>
<button class="snap-start whitespace-nowrap px-3 py-1.5 rounded-full bg-brand-surface text-on-surface-variant border border-[#36343a] font-label-sm text-[12px]">Desserts</button>
</div>
</section>
<!-- Product Grid -->
<section class="p-3 grid grid-cols-2 gap-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 flex-grow">
<!-- Product Card 1 -->
<article class="bg-[#181c27] rounded-lg border border-[#36343a] overflow-hidden flex flex-col active:scale-95 transition-transform h-min">
<div class="h-20 bg-surface-container-highest relative">
<img alt="Pad Thai" class="w-full h-full object-cover opacity-80" data-alt="close up of traditional thai pad thai noodles with shrimp, peanuts, and lime wedges on a dark ceramic plate with dramatic lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8rXHXIiQ9ySp66OrS0u1gQJJVhUVzWNDgkm8EBI3Gf8wiMfXWUKDtoGw4gunx9aQnKWLgiu5a2IeiKxwDsBGL-bXdg3sBtY7-6mCXCZ3ZFkukknCX63Dma7YKmX7SguEK-3Wwxn1DHBBlR1cp2R-Dm6g_fXNd8CPyTuhrHnboP71meKmjD1Ab5LU3tpYXBEAKVsjsfX1uhTF5gp8jZRwe-yz164-xyCVGOWF-AJ_Jz9ySbY-gAOV155HfrybX03woiHAYEtRHEHQ"/>
<div class="absolute top-1 right-1 bg-[#0f1117]/80 backdrop-blur-sm px-1.5 py-0.5 rounded border border-[#36343a]">
<span class="font-numeric-md text-[14px] text-brand-orange">฿80</span>
</div>
</div>
<div class="p-2 flex-1 flex flex-col justify-between">
<h3 class="font-body-md text-[14px] text-on-surface line-clamp-2 leading-tight">Pad Thai Shrimp</h3>
<div class="mt-1 flex justify-between items-center text-on-surface-variant">
<span class="font-label-sm text-[11px]">Main</span>
</div>
</div>
</article>
<!-- Product Card 2 -->
<article class="bg-[#181c27] rounded-lg border border-[#36343a] overflow-hidden flex flex-col active:scale-95 transition-transform h-min">
<div class="h-20 bg-surface-container-highest relative">
<img alt="Tom Yum" class="w-full h-full object-cover opacity-80" data-alt="spicy tom yum goong soup in a traditional dark bowl with lemongrass and chili under moody warm restaurant lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBKeSryQjsJShHY3lnJW1gvoeMo4zCzbGmFs3fDcNHQZjLcimgbw_iehd3mPj5qtwrzWynXKocNiDpHtTAsU5dkZWhWPqVYvgiQSmvSfH1Hap-UIko80XIe8oCd4JU8hKh7iWG_23Ngd_ev6yHY2aPQngB_KzC8b-IOudTws89mEGPkA_JQ8Et0-SCOKgTYWtqyqz4bE0rBFKGMBJcKWOaZ7WwVJxQBdb5cdFY3f5vRQN6VRcoQVVlFTMq9pCp9Eoww_yOCMaD0yvo"/>
<div class="absolute top-1 right-1 bg-[#0f1117]/80 backdrop-blur-sm px-1.5 py-0.5 rounded border border-[#36343a]">
<span class="font-numeric-md text-[14px] text-brand-orange">฿120</span>
</div>
</div>
<div class="p-2 flex-1 flex flex-col justify-between">
<h3 class="font-body-md text-[14px] text-on-surface line-clamp-2 leading-tight">Tom Yum Goong</h3>
<div class="mt-1 flex justify-between items-center text-on-surface-variant">
<span class="font-label-sm text-[11px]">Main</span>
</div>
</div>
</article>
<!-- Product Card 3 -->
<article class="bg-[#181c27] rounded-lg border border-[#36343a] overflow-hidden flex flex-col active:scale-95 transition-transform h-min">
<div class="h-20 bg-surface-container-highest relative flex items-center justify-center">
<span class="material-symbols-outlined text-3xl text-on-surface-variant opacity-50">local_drink</span>
<div class="absolute top-1 right-1 bg-[#0f1117]/80 backdrop-blur-sm px-1.5 py-0.5 rounded border border-[#36343a]">
<span class="font-numeric-md text-[14px] text-brand-orange">฿25</span>
</div>
</div>
<div class="p-2 flex-1 flex flex-col justify-between">
<h3 class="font-body-md text-[14px] text-on-surface line-clamp-2 leading-tight">Thai Iced Tea</h3>
<div class="mt-1 flex justify-between items-center text-on-surface-variant">
<span class="font-label-sm text-[11px]">Drinks</span>
</div>
</div>
</article>
<!-- Product Card 4 -->
<article class="bg-[#181c27] rounded-lg border border-[#36343a] overflow-hidden flex flex-col active:scale-95 transition-transform h-min">
<div class="h-20 bg-surface-container-highest relative flex items-center justify-center">
<span class="material-symbols-outlined text-3xl text-on-surface-variant opacity-50">local_dining</span>
<div class="absolute top-1 right-1 bg-[#0f1117]/80 backdrop-blur-sm px-1.5 py-0.5 rounded border border-[#36343a]">
<span class="font-numeric-md text-[14px] text-brand-orange">฿60</span>
</div>
</div>
<div class="p-2 flex-1 flex flex-col justify-between">
<h3 class="font-body-md text-[14px] text-on-surface line-clamp-2 leading-tight">Green Curry</h3>
<div class="mt-1 flex justify-between items-center text-on-surface-variant">
<span class="font-label-sm text-[11px]">Main</span>
</div>
</div>
</article>
</section>
</main>
<!-- Floating Cart Summary Summary Bar -->
<div class="fixed bottom-[calc(env(safe-area-inset-bottom,20px)+70px)] left-0 w-full px-3 z-40">
<button class="w-full bg-brand-orange text-[#0f1117] rounded-xl p-3 shadow-[0_8px_16px_-4px_rgba(249,115,22,0.3)] flex justify-between items-center active:scale-[0.98] transition-transform">
<div class="flex items-center gap-2">
<div class="bg-[#0f1117]/20 rounded-full w-6 h-6 flex items-center justify-center">
<span class="font-numeric-md text-[14px] font-bold">3</span>
</div>
<span class="font-body-md text-[15px] font-bold">View Order</span>
</div>
<div class="flex items-center gap-1">
<span class="font-numeric-xl text-[20px] font-bold">฿225.00</span>
<span class="material-symbols-outlined">chevron_right</span>
</div>
</button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 py-2 bg-[#181c27] z-50 border-t border-[#94a3b8]/10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.3)] pb-[calc(env(safe-area-inset-bottom,20px)+8px)]">
<!-- Active Item (Order) -->
<button class="flex flex-col items-center justify-center text-orange-500 bg-orange-500/10 rounded-lg py-1 w-full active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined mb-0.5 text-[20px]" style="font-variation-settings: 'FILL' 1;">restaurant</span>
<span class="font-['Work_Sans'] text-[10px] font-bold uppercase">Order</span>
</button>
<!-- Inactive Item (History) -->
<button class="flex flex-col items-center justify-center text-slate-400 py-1 w-full hover:text-orange-400 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined mb-0.5 text-[20px]">history</span>
<span class="font-['Work_Sans'] text-[10px] font-bold uppercase">History</span>
</button>
<!-- Inactive Item (Settings) -->
<button class="flex flex-col items-center justify-center text-slate-400 py-1 w-full hover:text-orange-400 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined mb-0.5 text-[20px]">settings</span>
<span class="font-['Work_Sans'] text-[10px] font-bold uppercase">Settings</span>
</button>
</nav>
<!-- Slide-up Order Panel (Hidden by default, shown for demonstration structure) -->
<div aria-hidden="true" class="fixed inset-0 z-50 bg-[#0f1117]/80 backdrop-blur-sm flex flex-col justify-end transform translate-y-full transition-transform duration-300 pointer-events-none">
<!-- Panel content would go here -->
</div>
</body></html>
